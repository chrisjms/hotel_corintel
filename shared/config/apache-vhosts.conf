# Apache VirtualHost Configuration for hothello.ovh
# Multi-hotel subdomain routing — Reorganized folder structure
#
# Structure:
#   /var/www/hotel/vitrine/     → hothello.ovh (showcase)
#   /var/www/hotel/superadmin/  → superadmin.hothello.ovh
#   /var/www/hotel/admin/       → admin-[slug].hothello.ovh
#   /var/www/hotel/client/      → [slug].hothello.ovh
#   /var/www/hotel/shared/      → shared code & assets (never a DocumentRoot)
#
# Prerequisites:
#   1. Wildcard SSL: certbot certonly --dns-ovh --dns-ovh-credentials ~/.ovh-credentials -d "*.hothello.ovh" -d hothello.ovh
#   2. DNS: *.hothello.ovh A record pointing to VPS IP
#   3. Enable modules: a2enmod rewrite ssl alias
#
# Install: cp this file to /etc/apache2/sites-available/hothello.conf && a2ensite hothello && systemctl reload apache2

# --- HTTP → HTTPS redirect (all domains) ---
<VirtualHost *:80>
    ServerName hothello.ovh
    ServerAlias *.hothello.ovh www.hothello.ovh
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# --- VHost 1: Showcase site (hothello.ovh) ---
<VirtualHost *:443>
    ServerName hothello.ovh
    ServerAlias www.hothello.ovh
    DocumentRoot /var/www/hotel/vitrine

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hothello.ovh/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hothello.ovh/privkey.pem

    <Directory /var/www/hotel/vitrine>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# --- VHost 2: Super admin (superadmin.hothello.ovh) ---
<VirtualHost *:443>
    ServerName superadmin.hothello.ovh
    DocumentRoot /var/www/hotel/superadmin

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hothello.ovh/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hothello.ovh/privkey.pem

    <Directory /var/www/hotel/superadmin>
        AllowOverride All
        Require all granted
    </Directory>

    # Block access to includes
    <Directory /var/www/hotel/superadmin/includes>
        Require all denied
    </Directory>
</VirtualHost>

# --- VHost 3: Hotel admin panels (admin-[slug].hothello.ovh) ---
# IMPORTANT: This VHost must be listed BEFORE the client wildcard so Apache matches it first
<VirtualHost *:443>
    ServerName admin-wildcard.hothello.ovh
    ServerAlias admin-*.hothello.ovh
    DocumentRoot /var/www/hotel/admin

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hothello.ovh/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hothello.ovh/privkey.pem

    # Serve shared assets via Alias
    Alias /uploads /var/www/hotel/shared/uploads
    Alias /images /var/www/hotel/shared/images
    Alias /js /var/www/hotel/shared/js

    <Directory /var/www/hotel/admin>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/hotel/admin/includes>
        Require all denied
    </Directory>

    <Directory /var/www/hotel/shared/uploads>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /var/www/hotel/shared/images>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /var/www/hotel/shared/js>
        Options -Indexes
        Require all granted
    </Directory>
</VirtualHost>

# --- VHost 4: Hotel client sites ([slug].hothello.ovh) ---
# Catches all remaining *.hothello.ovh subdomains
<VirtualHost *:443>
    ServerName wildcard-client.hothello.ovh
    ServerAlias *.hothello.ovh
    DocumentRoot /var/www/hotel/client

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hothello.ovh/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hothello.ovh/privkey.pem

    # Serve shared assets via Alias
    Alias /uploads /var/www/hotel/shared/uploads
    Alias /images /var/www/hotel/shared/images
    Alias /js /var/www/hotel/shared/js

    <Directory /var/www/hotel/client>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/hotel/shared/uploads>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /var/www/hotel/shared/images>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /var/www/hotel/shared/js>
        Options -Indexes
        Require all granted
    </Directory>
</VirtualHost>
