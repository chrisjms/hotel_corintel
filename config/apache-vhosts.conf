# Apache VirtualHost Configuration for hothello.ovh
# Multi-hotel subdomain routing
#
# Prerequisites:
#   1. Wildcard SSL: certbot certonly --dns-ovh --dns-ovh-credentials ~/.ovh-credentials -d "*.hothello.ovh" -d hothello.ovh
#   2. DNS: *.hothello.ovh A record pointing to VPS IP
#   3. Enable modules: a2enmod rewrite ssl
#
# Install: cp this file to /etc/apache2/sites-available/hothello.conf && a2ensite hothello

# --- HTTP → HTTPS redirect (all domains) ---
<VirtualHost *:80>
    ServerName hothello.ovh
    ServerAlias *.hothello.ovh www.hothello.ovh
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# --- VHost 1: Main showcase site (hothello.ovh) ---
<VirtualHost *:443>
    ServerName hothello.ovh
    ServerAlias www.hothello.ovh
    DocumentRoot /var/www/hothello

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hothello.ovh/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hothello.ovh/privkey.pem

    <Directory /var/www/hothello>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# --- VHost 2: Super admin (superadmin.hothello.ovh) ---
<VirtualHost *:443>
    ServerName superadmin.hothello.ovh
    DocumentRoot /var/www/hotel

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hothello.ovh/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hothello.ovh/privkey.pem

    RewriteEngine On
    # Rewrite all requests to super-admin/ unless already there
    RewriteCond %{REQUEST_URI} !^/super-admin/
    RewriteRule ^/(.*)$ /super-admin/$1 [L]

    <Directory /var/www/hotel>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# --- VHost 3: Wildcard - hotel client + admin subdomains ---
# Handles: [slug].hothello.ovh (client) and admin-[slug].hothello.ovh (admin)
# PHP bootstrap.php distinguishes between the two via HTTP_HOST
<VirtualHost *:443>
    ServerName wildcard.hothello.ovh
    ServerAlias *.hothello.ovh
    DocumentRoot /var/www/hotel

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/hothello.ovh/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hothello.ovh/privkey.pem

    <Directory /var/www/hotel>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
